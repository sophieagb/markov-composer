<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Markov Composer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <h1>Markov Composer</h1>
  <p class="subtitle"> ♫⋆｡♪ ₊˚♬ play a melody • then generate something new ♫⋆｡♪ ₊˚♬</p>

  <div class="tabs">
    <button class="tab active" id="tabRecord" onclick="switchTab('record')"> record melody 🎹 </button>
    <button class="tab" id="tabTwinkle" onclick="switchTab('twinkle')"> use twinkle twinkle ⭐ </button>
  </div>

  <div id="panelRecord">
    <div class="section-label">play notes on the piano</div>
    <div class="piano-section">
      <div class="piano-wrapper">
        <div class="keyboard" id="keyboard"></div>
      </div>
      <div class="melody-display" id="melodyDisplay">
        <span class="melody-empty"> no notes recorded yet; click the keys above </span>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="playRecorded()">▶ Preview Melody</button>
      <button class="btn btn-danger" onclick="clearRecorded()">✕ Clear</button>
      
    </div>
  </div>

  <div id="panelTwinkle" style="display:none;">
    <div class="section-label">using built-in twinkle twinkle</div>
    <div class="melody-display" id="twinkleDisplay"></div>
  </div>

  <div class="section-label" style="margin-top:24px;">generate</div>
  <div class="controls-row">
    <div class="control-item">
      <label>order (n)</label>
      <input type="number" id="order" value="2" min="1" max="5">
    </div>
    <div class="control-item">
      <label>notes to generate</label>
      <input type="number" id="numNotes" value="10" min="4" max="128">
    </div>
    <div class="control-item">
        <label>temperature</label>
        <input type="range" id="temperature" min="0.1" max="3" step="0.1" value="1">
        <span id="tempValue">1.0</span>
    </div>
  </div>
  <div class="btn-row">
    <button class="btn btn-primary" onclick="generate()">✨ generate & play</button>
    <button class="btn btn-secondary" onclick="stopPlayback()">⏹ Stop</button>
  </div>

  <div class="output-section" id="outputSection" style="display:none;">
    <div class="status" id="statusText">Generated sequence:</div>
    <div class="output-notes" id="outputNotes"></div>
  </div>

<script src="script.js"></script>
</body>
</html>
